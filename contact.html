  <script src="./assets/vendor/bootstrap/bootstrap.bundle.min.js"></script>
  <script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxVizk6uqD1TVOLpeKPjMaRKhGWrKoJwE8aHsaWUt6vwOK6mfUOTqYtO_2NyhUz2WdxAg/exec'
    const form = document.forms['contact-form']
    const btnSubmit = document.querySelector('.btn-submit')
    const btnLoading = document.querySelector('.btn-loading')
    const myAlert = document.querySelector('.my-alert')

    form.addEventListener('submit', e => {
      e.preventDefault()
      //Click on the sumbit button show loading button and dismiss submit button
      btnLoading.classList.toggle('d-none')
      btnSubmit.classList.toggle('d-none')
      fetch(scriptURL, { method: 'POST', body: new FormData(form) })
        .then(response => {
          btnLoading.classList.toggle('d-none')
          btnSubmit.classList.toggle('d-none')
          //Show alert!
          myAlert.classList.toggle('d-none')
          //reset form
          form.reset()
          console.log('Success!', response)
        })
        .catch(error => console.error('Error!', error.message))
    })
  </script>
